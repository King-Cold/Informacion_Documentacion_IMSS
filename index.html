<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<title>Guía de Trámites IMSS</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
body{
margin:0;
font-family:"Montserrat";
height:100vh;
display:flex;
flex-direction:column;
}

.panel-superior{
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 40px;
background:#ffffff;
border-bottom:1px solid #e0e0e0;
box-sizing:border-box;
}

.panel-superior img{
height:40px;
}

.seccion-principal{
flex:1;
display:flex;
width:100%;
flex-wrap:wrap;
}

.columna{
flex:1 1 50%;
position:relative;
}

.imagen-izquierda{
background-image:url('img/imss.png');
background-size:cover;
background-position:center;
position:relative;
}

.imagen-derecha-texto{
position:relative;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.imagen-derecha-texto::before{
content:'';
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background-image:url('img/imagen-derecha-texto.png');
background-size:cover;
background-position:center;
opacity:0.1; /* solo imagen */
z-index:0;
}

.imagen-derecha-texto::after{
content:'';
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(
to left,
rgba(255,255,255,0) 75%,
rgba(255,255,255,1) 100%
);
z-index:1;
}
.imagen-izquierda::after{
content:'';
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(
to right,
rgba(255,255,255,0) 75%,
rgba(255,255,255,0.9) 100%
);
}
.contenido-texto{
position:relative;
z-index:2;
color:#121212;
text-align:center;
padding:40px;
max-width:600px;
}

.contenido-texto h1{
font-size:42px;
margin-bottom:20px;
line-height:1.2;
color: #0C372D;
}

.contenido-texto p{
font-size:18px;
margin-bottom:30px;
line-height:1.6;
}

.boton{
display:inline-block;
padding:15px 30px;
background:#ffffff;
color:#235b4e;
border: 3px solid #235b4e;
text-decoration:none;
border-radius:6px;
font-weight:bold;
transition:0.3s;
display: inline-flex;
  align-items: center; 
  gap: 10px;
}
.boton i{
  font-size: 1.1em;     /* Un poquito más grande que el texto */
  opacity: 0.9;
}
.boton:hover{
background:#006b2a;
color: #ffffff;
}

@media (max-width:900px){

.seccion-principal{
flex-direction:column;
}

.contenido-texto h1{
font-size:32px;
}

.contenido-texto p{
font-size:16px;
}
@media (max-width:900px){

.imagen-izquierda::after{
background:linear-gradient(
to bottom,
rgba(255,255,255,0) 75%,
rgba(255,255,255,1) 100%
);
}
.imagen-derecha-texto::after{
background:linear-gradient(
to top,
rgba(255,255,255,0) 75%,
rgba(255,255,255,1) 100%
);
}
}
}
@media (max-width:500px){

.panel-superior{
padding:10px 20px;
}

.panel-superior img{
height:30px;
}

.contenido-texto{
padding:30px 20px;
}

.contenido-texto h1{
font-size:26px;
}

.boton{
padding:12px 20px;
font-size:14px;
}

}

</style>
</head>

<body>

<div class="panel-superior">
<img src="img/logo-imss.png" alt="IMSS">
<img src="img/logo-gobierno.jpeg" alt="Gobierno de México">
</div>

<section class="seccion-principal">

<div class="columna imagen-izquierda"></div>

<div class="columna imagen-derecha-texto">

<div class="contenido-texto">

<h1>GUÍA DE TRÁMITES Y REQUISITOS IMSS</h1>

<p>
Consulta de forma clara y rápida los documentos
y pasos necesarios para tu solicitud.
</p>

<a href="menu/menu.html" class="boton">
  VER INFORMACIÓN DE TRÁMITES
  <i class="fa-solid fa-right-long"></i>
</a>

</div>

</div>

</section>

</body>
</html>
